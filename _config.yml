# -------------------------
# Site identity
# -------------------------
locale: "en-US"
site_theme: "default"

title: "Meet Paghadar | Data Science & ML Portfolio"
title_separator: "-"
name: "Meet Paghadar"
description: "Portfolio showcasing projects in Data Science, Machine Learning, Data Visualization, and Analytics."

# -------------------------
# GitHub Pages settings
# -------------------------
url: "https://idkmeet.github.io"
baseurl: ""

repository: "Idkmeet/Meet_Paghadar.github.io"

# -------------------------
# Author profile
# -------------------------
author:
  avatar: "Profile.jpg"
  name: "Meet Paghadar"
  bio: "Data Science student at University of Houston–Clear Lake with a focus on machine learning, analytics, and real-world applications."
  location: "Houston, Texas"
  employer: "University of Houston-Clear Lake"
  email: "meet@uhcl.edu"

  github: "Idkmeet"
  linkedin: "meet-paghadar"   # use only username, not full URL

# -------------------------
# General settings
# -------------------------
breadcrumbs: false
words_per_minute: 180
future: true

# -------------------------
# Markdown
# -------------------------
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

# -------------------------
# Collections
# -------------------------
collections:
  publications:
    output: true
    permalink: /publications/:path/

  portfolio:
    output: true
    permalink: /portfolio/:path/

# -------------------------
# Defaults
# -------------------------
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# -------------------------
# Include / Exclude
# -------------------------
include:
  - _pages

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

# -------------------------
# URLs
# -------------------------
permalink: /:categories/:title/
timezone: "America/Chicago"

# -------------------------
# Plugins
# -------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
